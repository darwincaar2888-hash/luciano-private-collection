<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Luciano Private Collection</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0d0d0d;
    color: white;
}

header {
    text-align: center;
    padding: 30px;
    background: #000;
}

h1 {
    margin: 0;
    font-size: 28px;
}

.boton {
    display: inline-block;
    margin-top: 15px;
    padding: 12px 20px;
    background: #25D366;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    font-weight: bold;
}

.galeria {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
    padding: 20px;
}

.galeria img {
    width: 100%;
    border-radius: 10px;
    transition: 0.3s;
}

.galeria img:hover {
    transform: scale(1.05);
}
</style>
</head>
