<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Categoría Anal</title>

<style>
  body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0a0a0a;
    color:#fff;
  }

  .wrap{
    width:min(1200px, calc(100% - 24px));
    margin:0 auto;
  }

  .hero{
    text-align:center;
    padding:24px 0 18px;
  }

  .hero h1{
    margin:0 0 18px;
    color:#f5c76b;
    font-size:clamp(32px, 6vw, 58px);
  }

  .hero-banner{
    max-width:460px;
    margin:0 auto 16px;
    background:#d9efea;
    border-radius:22px;
    overflow:hidden;
    border:1px solid rgba(245,199,107,.18);
    box-shadow:0 10px 30px rgba(0,0,0,.35);
  }

  .hero-banner img{
    width:100%;
    height:auto;
    display:block;
    object-fit:contain;
  }

  .hero p{
    margin:0 auto;
    max-width:760px;
    color:#d8d8d8;
    line-height:1.6;
    font-size:15px;
  }

  .container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:18px;
    padding:18px 0 30px;
  }

  .card{
    background:#111;
    border-radius:20px;
    overflow:hidden;
    border:1px solid rgba(245,199,107,.16);
    box-shadow:0 10px 30px rgba(0,0,0,.35);
  }

  .img-box{
    width:100%;
    height:320px;
    background:#d9efea;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:10px;
  }

  .img-box img{
    width:100%;
    height:100%;
    object-fit:contain;
    object-position:center;
    display:block;
  }

  .info{
    padding:14px;
  }

  .title{
    font-size:18px;
    font-weight:800;
    line-height:1.2;
    min-height:44px;
  }

  .price{
    color:#f5c76b;
    font-size:32px;
    font-weight:800;
    margin:10px 0 14px;
  }

  .btn{
    display:block;
    text-align:center;
    background:#25D366;
    padding:14px;
    border-radius:14px;
    color:white;
    text-decoration:none;
    font-weight:bold;
    font-size:20px;
  }
</style>
</head>
<body>

<div class="wrap">
  <section class="hero">
    <h1>🔥 Categoría Anal</h1>

    <!-- ESTA IMAGEN YA NO VA COMO PRODUCTO -->
    <div class="hero-banner">
      <img src="anal/IMG-20260320-WA0001.jpg" alt="Anales Cómplices">
    </div>

    <p>
      Explora los productos de la categoría anal y compra directo por WhatsApp.
    </p>
  </section>

  <div class="container" id="productos"></div>
</div>

<script>
const productos = [
  {
    img:"anal/IMG-20260320-WA0000.jpg",
    nombre:"Plug Anal Baxter",
    precio:"20",
    mensaje:"Hola quiero comprar Plug Anal Baxter"
  },
  {
    img:"anal/IMG-20260320-WA0002.jpg",
    nombre:"Cola de Zorro Blanco",
    precio:"18",
    mensaje:"Hola quiero comprar Cola de Zorro Blanco"
  },
  {
    img:"anal/IMG-20260320-WA0003.jpg",
    nombre:"Cola de Zorro Negro",
    precio:"18",
    mensaje:"Hola quiero comprar Cola de Zorro Negro"
  }
];

const contenedor = document.getElementById("productos");

productos.forEach(p => {
  contenedor.innerHTML += `
    <div class="card">
      <div class="img-box">
        <img src="${p.img}" alt="${p.nombre}">
      </div>
      <div class="info">
        <div class="title">${p.nombre}</div>
        <div class="price">$${p.precio}</div>
        <a class="btn" href="https://wa.me/593992064254?text=${encodeURIComponent(p.mensaje)}">
          Comprar ahora
        </a>
      </div>
    </div>
  `;
});
</script>

</body>
</html>
