<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Categoría Anal</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0a0a0a;
    color:#fff;
}

h1{
    text-align:center;
    padding:20px;
    color:#f5c76b;
}

.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
    gap:15px;
    padding:15px;
}

.card{
    background:#111;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
    background:#222;
}

.info{
    padding:10px;
}

.title{
    font-size:13px;
    font-weight:bold;
}

.price{
    color:#f5c76b;
    font-size:18px;
    margin:8px 0;
}

.btn{
    display:block;
    text-align:center;
    background:#25D366;
    padding:10px;
    border-radius:10px;
    color:white;
    text-decoration:none;
    font-weight:bold;
}
</style>
</head>

<body>

<h1>🔥 Categoría Anal</h1>

<div class="container" id="productos"></div>

<script>
const productos = [
{img:"anal/IMG-20260320-WA0000.jpg", nombre:"Plug Anal Básico", precio:13},
{img:"anal/IMG-20260320-WA0001.jpg", nombre:"Plug Silicona Pequeño", precio:13},
{img:"anal/IMG-20260320-WA0002.jpg", nombre:"Plug Silicona Redondo", precio:13},
{img:"anal/IMG-20260320-WA0003.jpg", nombre:"Rosario Anal", precio:15},
{img:"anal/IMG-20260320-WA0004.jpg", nombre:"Plug Anal Baxter", precio:20},
{img:"anal/IMG-20260320-WA0005.jpg", nombre:"Kit Anal Fantasía", precio:19},
{img:"anal/IMG-20260320-WA0006.jpg", nombre:"Kit Anal Dark Night", precio:35},
{img:"anal/IMG-20260320-WA0007.jpg", nombre:"Kit Anal Nessy", precio:35},
{img:"anal/IMG-20260320-WA0008.jpg", nombre:"Plug Jack Vibrador", precio:45},
{img:"anal/IMG-20260320-WA0009.jpg", nombre:"Vibrador Ragnar", precio:55}
];

const contenedor = document.getElementById("productos");

productos.forEach(p => {
    contenedor.innerHTML += `
    <div class="card">
        <img src="${p.img}">
        <div class="info">
            <div class="title">${p.nombre}</div>
            <div class="price">$${p.precio}</div>
            <a class="btn" href="https://wa.me/593992064254?text=Hola quiero ${encodeURIComponent(p.nombre)}">
            Comprar ahora
            </a>
        </div>
    </div>
    `;
});
</script>

</body>
</html>
